spring.application.name=apidfe

# Overrides locais (não versionado): ./application-local.properties na raiz do projeto
spring.config.import=optional:file:./application-local.properties

# HTTP Basic auth (mesmo padrão nfeService)
spring.security.user.name=${DFE_API_USER:dfeapi}
spring.security.user.password=${DFE_API_PASSWORD:dfeapi}

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:dfe-service}?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Schema por Flyway (não por ddl-auto).
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

spring.main.banner-mode=off
server.port=9090

spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.locale=pt_BR
logging.level.org.hibernate.SQL=WARN
